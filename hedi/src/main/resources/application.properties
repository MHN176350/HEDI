spring.application.name=demo


spring.datasource.url=jdbc:postgresql://localhost:5432/{name}
spring.datasource.username=postgres
spring.datasource.password={pw}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
server.port=8080
server.servlet.context-path=/

# ============= SWAGGER/OpenAPI CONFIGURATION =============
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.deepLinking=true
springdoc.swagger-ui.displayOperationId=true

# ============= JWT CONFIGURATION =============
jwt.secret=mySecretKeyForJWTTokenGenerationWithMinimum256BitsLength123456
jwt.expiration=86400000
